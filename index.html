<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Around the U.S.</title>
    <link href="./pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          src="./images/header_logo.svg"
          alt="Logo of Around the U.S."
          class="header__image"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <img
            src="./images/jacques-cousteau.jpg"
            alt="Avatar"
            class="profile__image"
          />
          <div class="profile__info">
            <h1 class="profile__title">Jacques Cousteau</h1>
            <button
              class="profile__edit-button"
              type="button"
            ></button>
            <p class="profile__description">Explorer</p>
          </div>
          <button class="profile__add-button" type="button"></button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list"></ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">&copy; 2022 Around The U.S.</p>
      </footer>

      <!-- Edit Modal -->
      <div class="modal" id="edit-modal">
        <div class="modal__content">
          <button class="modal__close" type="button"></button>
          <h3 class="modal__title">Edit Profile</p>
          <form class="modal__form" id="edit-profile-form">
            <fieldset class="modal__form-fieldset">
              <input
                type="text"
                name="name"
                class="modal__input modal__input_type_name"
                placeholder="Name"
              />
            </fieldset>
            <img src="./images/Line_2.svg" alt="line" class="modal__line" />
            <fieldset class="modal__form-fieldset">
              <input
                type="text"
                name="about me"
                class="modal__input modal__input_type_description"
                placeholder="Description"
              />
            </fieldset>
           <img src="./images/Line_2.1.svg" alt="line" class="modal__line" />
            <button class="button modal__button" type="submit">Save</button>
          </form>
        </div>
      </div>

      <!-- Add card modal -->
      <div class="modal">
        <div class="modal__content">
          <button class="modal__close" type="button"></button>
          <h3 class="modal__title">New Place</p>
          <form class="modal__form" id="add-card-form">
            <fieldset class="modal__form-fieldset">
              <input
                type="text"
                name="title"
                class="modal__input modal__input_type_title"
                placeholder="Title"
              />
            </fieldset>
            <img src="./images/Line_2.svg" alt="line" class="modal__line" />
            <fieldset class="modal__form-fieldset">
              <input
                type="text"
                name="url"
                class="modal__input modal__input_type_url"
                placeholder="Image URL"
              />
            </fieldset>
           <img src="./images/Line_2.1.svg" alt="line" class="modal__line" />
            <button class="button modal__button" type="submit">Save</button>
          </form>
        </div>
      </div>
    </div>
    <template id="card-template">
      <li class="card">
        <img src="" alt="" class="card__image" />
        <div class="card__description">
          <h2 class="card__title"></h2>
          <button class="card__like-button" type="button"></button>
        </div>
      </li>
    </template>

    <script src="./scripts/index.js"></script>
  </body>
</html>
